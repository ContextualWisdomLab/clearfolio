name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Maven test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Use preinstalled Temurin JDK 21
        # Uses the runner image's bundled JDK instead of actions/setup-java to
        # keep every workflow dependency hash-pinned (Scorecard Pinned-Dependencies).
        run: |
          echo "JAVA_HOME=$JAVA_HOME_21_X64" >> "$GITHUB_ENV"
          echo "$JAVA_HOME_21_X64/bin" >> "$GITHUB_PATH"
      - name: Run tests
        run: mvn -B --no-transfer-progress test

  script-checks:
    name: Buyer-readiness script tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
      - name: Install pytest
        # Hash-pinned per OpenSSF Scorecard Pinned-Dependencies. Recompile with:
        # uv pip compile --generate-hashes --universal --python-version 3.12 requirements-test.in -o requirements-test.txt
        run: python -m pip install --disable-pip-version-check --no-cache-dir --require-hashes -r requirements-test.txt
      - name: Run script tests
        run: python -m pytest -q scripts
