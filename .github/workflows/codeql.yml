name: CodeQL

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "23 18 * * 1"

permissions:
  contents: read

jobs:
  analyze-java:
    name: analyze-java
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Explain scan target
        run: |
          echo "::notice::Running CodeQL Java/Kotlin analysis for Clearfolio."
          echo "::notice::SARIF upload requires security-events: write on this job."

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9
        with:
          languages: java-kotlin

      - name: Autobuild
        uses: github/codeql-action/autobuild@99df26d4f13ea111d4ec1a7dddef6063f76b97e9

      - name: Analyze
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9
        with:
          category: "/language:java-kotlin"
