name: PR Review Merge Scheduler

on:
  schedule:
    - cron: "17 */2 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: Print planned actions without mutating PRs
        required: false
        default: false
        type: boolean
      max_prs:
        description: Maximum open PRs to inspect
        required: false
        default: "100"
      trigger_reviews:
        description: Dispatch OpenCode Review for PR heads without current approval
        required: false
        default: true
        type: boolean
      merge_mode:
        description: "Merge behavior for current-head approved PRs: auto, direct, or disabled"
        required: false
        default: direct
      update_branches:
        description: Update outdated PR branches after OpenCode approval
        required: false
        default: true
        type: boolean

jobs:
  scan-pr-queue:
    permissions:
      actions: write
      checks: read
      contents: write
      pull-requests: write
    uses: ContextualWisdomLab/.github/.github/workflows/pr-review-merge-scheduler.yml@main
    with:
      dry_run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == true }}
      max_prs: ${{ inputs.max_prs || '100' }}
      trigger_reviews: ${{ github.event_name == 'schedule' || inputs.trigger_reviews == true }}
      merge_mode: ${{ inputs.merge_mode || vars.PR_MERGE_MODE || 'direct' }}
      update_branches: ${{ github.event_name == 'schedule' || inputs.update_branches == true }}
      project_flow: github-flow
      base_branch: ${{ github.event.repository.default_branch }}
      canonical_ref: main
