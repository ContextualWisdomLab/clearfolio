spring:
  application:
    name: clearfolio-viewer
  codec:
    max-in-memory-size: ${conversion.max-upload-size-bytes}

conversion:
  blocked-extensions:
    - hwp
    - hwpx
  worker-threads: ${CLEARFOLIO_WORKER_THREADS:4}
  queue-capacity: ${CLEARFOLIO_QUEUE_CAPACITY:200}
  max-retry-attempts: ${CLEARFOLIO_MAX_RETRY_ATTEMPTS:3}
  retry-initial-delay-ms: ${CLEARFOLIO_RETRY_INITIAL_DELAY_MS:500}
  retry-max-delay-ms: ${CLEARFOLIO_RETRY_MAX_DELAY_MS:5000}
  retry-backoff-multiplier: ${CLEARFOLIO_RETRY_BACKOFF_MULTIPLIER:2.0}
  max-upload-size-bytes: ${CLEARFOLIO_MAX_UPLOAD_SIZE_BYTES:5242880}

viewer:
  security:
    frame-ancestors: ${CLEARFOLIO_FRAME_ANCESTORS:self}

clearfolio:
  artifact-token:
    secret: ${CLEARFOLIO_ARTIFACT_TOKEN_SECRET:}
  tenant-claims:
    hmac-secret: ${CLEARFOLIO_TENANT_CLAIMS_HMAC_SECRET:}
    max-skew-seconds: ${CLEARFOLIO_TENANT_CLAIMS_MAX_SKEW_SECONDS:300}
  artifact-link-ledger:
    path: ${CLEARFOLIO_ARTIFACT_LINK_LEDGER_PATH:}
  analytics-snapshot-ledger:
    path: ${CLEARFOLIO_ANALYTICS_SNAPSHOT_LEDGER_PATH:}
